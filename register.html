<!DOCTYPE html>
<html>
<head>

<title>Register Complaint</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Complaint Registration</h2>

<form onsubmit="submitComplaint(event)">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="number" class="form-control" required>
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Ward Number</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label>Complaint Type</label>

<select class="form-control">
<option>Water Leak</option>
<option>Pipe Broken</option>
<option>Current Cut</option>
<option>Waste Bin Issue</option>
</select>

</div>

<div class="mb-3">
<label>Description</label>
<textarea class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Upload Image</label>
<input type="file" class="form-control">
</div>

<button class="btn btn-primary">Submit Complaint</button>

</form>

</div>

<script src="js/script.js"></script>

</body>
</html>
